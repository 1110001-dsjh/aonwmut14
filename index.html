    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
// --- PDF 轉圖核心功能 ---
var p2iCurrentDoc = null;
var p2iNextPage = 1;
const P2I_BATCH_SIZE = 10; // 每批次渲染 10 頁，防止瀏覽器當機

async function handlePdf2ImgSelection(e) {
    var f = e.target.files[0];
    if(!f) return;
    showLoading("讀取 PDF...", "正在解析檔案結構");
    try {
        var buf = await f.arrayBuffer();
        p2iCurrentDoc = await pdfjsLib.getDocument({data: buf}).promise;
        document.getElementById('p2iBtn').disabled = false;
        showToast("PDF 讀取成功，共 " + p2iCurrentDoc.numPages + " 頁");
    } catch(ex) {
        alert("PDF 讀取失敗: " + ex.message);
    } finally {
        hideLoading();
    }
}

async function startPdfToImgConversion() {
    if(!p2iCurrentDoc) return;
    clearPdf2Img();
    document.getElementById('p2iPlaceholder').style.display = 'none';
    p2iNextPage = 1;
    await continueRendering();
}

async function continueRendering() {
    const total = p2iCurrentDoc.numPages;
    const start = p2iNextPage;
    const end = Math.min(start + P2I_BATCH_SIZE - 1, total);
    const format = document.getElementById('p2iFormat').value;
    const quality = parseFloat(document.getElementById('p2iQuality').value);
    const scale = parseFloat(document.getElementById('p2iScale').value);
    const container = document.getElementById('p2iContainer');
    const loadMoreBtn = document.getElementById('p2iLoadMore');

    showLoading("轉換中...", "正在處理第 " + start + " 到 " + end + " 頁");
    loadMoreBtn.classList.add('hidden');

    try {
        for(let i = start; i <= end; i++) {
            const page = await p2iCurrentDoc.getPage(i);
            const viewport = page.getViewport({ scale: scale });
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.height = viewport.height;
            canvas.width = viewport.width;

            await page.render({ canvasContext: ctx, viewport: viewport }).promise;
            
            // 轉為 Base64
            const imgData = canvas.toDataURL(format, format === 'image/jpeg' ? quality : undefined);
            
            // 建立預覽元件
            const wrapper = document.createElement('div');
            wrapper.className = "bg-white p-2 shadow-lg rounded relative group";
            wrapper.innerHTML = `
                <div class="absolute top-4 left-4 bg-black/50 text-white px-2 py-1 rounded text-xs">第 ${i} 頁</div>
                <img src="${imgData}" class="w-full h-auto rounded border border-gray-100">
                <a href="${imgData}" download="page_${i}.${format === 'image/png' ? 'png' : 'jpg'}" class="absolute top-4 right-4 bg-indigo-600 text-white p-2 rounded-full opacity-0 group-hover:opacity-100 transition-opacity shadow-lg">
                    <i class="fa-solid fa-download"></i>
                </a>
            `;
            container.appendChild(wrapper);
            
            // 釋放 Canvas 記憶體
            canvas.width = 0; canvas.height = 0;
        }

        p2iNextPage = end + 1;
        if(p2iNextPage <= total) {
            loadMoreBtn.classList.remove('hidden');
        } else {
            showToast("全部轉換完成！");
        }
    } catch(err) {
        alert("轉換出錯: " + err.message);
    } finally {
        hideLoading();
        // 自動捲動到新產生的內容
        if(start > 1) {
            const scrollArea = document.getElementById('pdf2imgResultArea');
            scrollArea.scrollBy({ top: 300, behavior: 'smooth' });
        }
    }
}

function clearPdf2Img() {
    document.getElementById('p2iContainer').innerHTML = '';
    document.getElementById('p2iPlaceholder').style.display = 'flex';
    document.getElementById('p2iLoadMore').classList.add('hidden');
    p2iNextPage = 1;
}
// --- 添加頁碼功能 ---
        var pageNumDoc = null; var pageNumFileRef = null;
        async function handlePageNumFileSelection(e) {
            var f = e.target.files[0]; if(!f) return; showLoading("讀取中...");
            try { 
                var buf = await new Promise(function(r){ var rd=new FileReader(); rd.onload=function(ev){r(ev.target.result)}; rd.readAsArrayBuffer(f); }); 
                pageNumDoc = await PDFLib.PDFDocument.load(buf); pageNumFileRef = f;
                document.getElementById('pageNumFileNameDisplay').innerText = f.name; 
                document.getElementById('pageNumTotalPagesText').innerText = pageNumDoc.getPageCount();
                document.getElementById('pageNumFileInfo').style.display = 'block'; 
                document.getElementById('pageNumBtn').disabled = false; 
            } catch(ex){ alert("解析 PDF 失敗"); } finally { hideLoading(); e.target.value=''; }
        }
        function clearPageNumFile() { pageNumDoc=null; pageNumFileRef=null; document.getElementById('pageNumFileInfo').style.display='none'; document.getElementById('pageNumBtn').disabled=true; }
        
        function hexToRgbForPdf(hex) {
            var result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? PDFLib.rgb(parseInt(result[1], 16)/255, parseInt(result[2], 16)/255, parseInt(result[3], 16)/255) : PDFLib.rgb(0, 0, 0);
        }

        async function executePageNum() {
            if(!pageNumDoc) return;
            showLoading("執行中...", "正在添加頁碼");
            try {
                // 1. 建立新文件與複製原始頁面
                const newDoc = await PDFLib.PDFDocument.create();
                const copiedPages = await newDoc.copyPages(pageNumDoc, pageNumDoc.getPageIndices());
                
                // 2. 取得使用者設定的參數
                const position = document.getElementById('pageNumPosition').value;
                const startNum = parseInt(document.getElementById('pageNumStart').value) || 1;
                const fontSize = parseInt(document.getElementById('pageNumSize').value) || 12;
                const colorHex = document.getElementById('pageNumColor').value;
                const fontColor = hexToRgbForPdf(colorHex);
                
                // 3. 取得頁碼格式、總頁數與封面設定
                const formatElement = document.getElementById('pageNumFormat');
                const formatPattern = formatElement ? formatElement.value : '{n} / {total}';
                const totalPages = copiedPages.length;
                
                const skipFirstElement = document.getElementById('pageNumSkipFirst');
                const skipFirst = skipFirstElement ? skipFirstElement.checked : false;
                
                // 【優化點 1】：如果跳過第一頁，顯示的「總頁數」也要自動減 1
                const displayTotalPages = skipFirst ? Math.max(1, totalPages - 1) : totalPages;
                
                // 4. 載入標準字體
                const font = await newDoc.embedFont(PDFLib.StandardFonts.Helvetica);

                // 5. 逐頁添加頁碼
                for(let i=0; i<copiedPages.length; i++) {
                    const page = copiedPages[i];
                    newDoc.addPage(page);
                    
                    // 如果勾選了「第一頁不顯示」，且目前是第一頁 (i===0)，則跳過
                    if (skipFirst && i === 0) {
                        continue;
                    }
                    
                    const { width, height } = page.getSize();
                    
                    // 【優化點 2】：依據是否跳過第一頁，調整當前頁碼的計算方式
                    // 如果跳過了第一頁，第二頁 (i=1) 的數字就會是 startNum (通常是 1)
                    const currentNum = skipFirst ? startNum + i - 1 : startNum + i;
                    const text = formatPattern.replace('{n}', currentNum).replace('{total}', displayTotalPages);
                    
                    const textWidth = font.widthOfTextAtSize(text, fontSize);
                    
                    // 計算座標位置
                    let x = 0; let y = 0; const margin = 30;

                    if(position.includes('left')) x = margin;
                    else if(position.includes('right')) x = width - textWidth - margin;
                    else x = (width - textWidth) / 2; // 置中

                    if(position.includes('bottom')) y = margin;
                    else y = height - margin - fontSize; // 頂部

                    // 繪製文字
                    page.drawText(text, { x: x, y: y, size: fontSize, font: font, color: fontColor });
                }
                
                // 6. 觸發下載
                triggerDownload(new Blob([await newDoc.save()], {type:'application/pdf'}), pageNumFileRef.name.replace('.pdf','') + "_已加頁碼.pdf");
                showToast("頁碼添加完成！");
            } catch(e) { 
                alert("錯誤: " + e.message); 
                console.error(e);
            } finally { 
                hideLoading(); 
            }
        }
    </script>

    <script>
        // --- 全域變數與預設解析度 ---
        const EDITOR_PREVIEW_SCALE = 3.0; 
        const STAMP_RENDER_SCALE = 3.0;   
        const DISPLAY_UI_SCALE = 1.3;

        var editFileList = []; var activeIdx = -1; var draggedItemIdx = null; var curTool = 'eraser';
        var pdfC = document.getElementById('pdfCanvas'), drawC = document.getElementById('drawCanvas'), wrap = document.getElementById('canvasWrapper'), annoL = document.getElementById('annotationLayer'), scrl = document.getElementById('canvasScrollArea'), rectPreview = document.getElementById('rectPreview');
        var pdfCtx = pdfC.getContext('2d'), drawCtx = drawC.getContext('2d');
        var isDrawing=false, startX, startY, isDraggingWidget=false, dragOff={x:0,y:0}, isPanning=false, panSX, panSY, panScX, panScY, clipboard=null, focusedAnnoId=null;

        // --- 初始化視窗 ---
        window.onload = function() {
            try {
                let winW = screen.availWidth * 0.94; let winH = screen.availHeight * 0.94;
                window.resizeTo(winW, winH); window.moveTo((screen.availWidth - winW) / 2, (screen.availHeight - winH) / 2);
            } catch(e) {} 
        };

        // --- 通用 UI 工具 ---
        function switchTab(t) {
            var tabs = document.querySelectorAll('.tab-content');
            for(var i=0; i<tabs.length; i++) tabs[i].classList.remove('active');
            document.getElementById('view-'+t).className += ' active';
            var btns = { merge: 'tabBtn-merge', split: 'tabBtn-split', edit: 'tabBtn-edit', img2pdf: 'tabBtn-img2pdf', pagenum: 'tabBtn-pagenum' , pdf2img: 'tabBtn-pdf2img' };
            for (var k in btns) {
                var el = document.getElementById(btns[k]);
                if (el) el.className = (k === t) ? "px-8 bg-white border-t-2 border-blue-500 font-bold text-blue-600 whitespace-nowrap" : "px-8 text-gray-500 hover:bg-gray-100 font-medium whitespace-nowrap";
            }
        }
        function showLoading(t, st) { document.getElementById('loadingText').innerText = t; document.getElementById('loadingSubText').innerText = st || ""; document.getElementById('loadingOverlay').style.display = 'flex'; }
        function hideLoading() { document.getElementById('loadingOverlay').style.display = 'none'; }
        function showToast(m) { var t = document.getElementById('toast'); t.innerText = m; t.style.display = 'block'; setTimeout(function(){ t.style.display = 'none'; }, 3000); }
        function triggerDownload(b, f) { var u = URL.createObjectURL(b), a = document.createElement('a'); a.href = u; a.download = f; document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(u); }

        // --- 合併功能 ---
        var mergeFiles = []; var draggedMergeIdx = null;
        function handleFileSelection(e) { for(var i=0; i<e.target.files.length; i++) { if(e.target.files[i].name.toLowerCase().indexOf('.pdf')!==-1) mergeFiles.push(e.target.files[i]); } e.target.value=''; renderMergeList(); }
        function renderMergeList() {
            var list = document.getElementById('fileList'), count = document.getElementById('fileCount'), btn = document.getElementById('mergeBtn'), empty = document.getElementById('emptyState');
            count.innerText = mergeFiles.length; btn.disabled = mergeFiles.length < 2;
            list.innerHTML = ''; if(!mergeFiles.length) { list.appendChild(empty); return; }
            for(var i=0; i<mergeFiles.length; i++) {
                (function(idx){
                    var li = document.createElement('li'); li.className = 'file-item py-2.5 px-4 flex justify-between bg-white items-center'; li.draggable = true;
                    li.ondragstart = function(e) { draggedMergeIdx = idx; e.dataTransfer.effectAllowed = 'move'; };
                    li.ondragover = function(e) { e.preventDefault(); var t = e.target; while(t && t.tagName !== 'LI') t = t.parentElement; if(t) t.classList.add('drag-over'); };
                    li.ondrop = function(e) { e.preventDefault(); if(draggedMergeIdx !== null && draggedMergeIdx !== idx) { var moved = mergeFiles.splice(draggedMergeIdx, 1)[0]; mergeFiles.splice(idx, 0, moved); renderMergeList(); } };
                    li.innerHTML = '<div class="flex items-center gap-3 pointer-events-none"><i class="fa-solid fa-grip-vertical text-gray-300"></i><span class="text-xs font-bold text-blue-600">'+(idx+1)+'</span><span class="text-sm truncate max-w-[200px]">'+mergeFiles[idx].name+'</span></div><button class="text-red-400" onclick="mergeFiles.splice('+idx+',1);renderMergeList()"><i class="fa-solid fa-xmark"></i></button>';
                    list.appendChild(li);
                })(i);
            }
        }
        async function mergePDFs() {
            showLoading("正在合併檔案...", "讀取 PDF 資料");
            try {
                const merged = await PDFLib.PDFDocument.create();
                for(var i = 0; i < mergeFiles.length; i++) {
                    var f = mergeFiles[i]; var b = await new Promise(function(r){ var rd=new FileReader(); rd.onload=function(ev){r(ev.target.result)}; rd.readAsArrayBuffer(f); });
                    const p = await PDFLib.PDFDocument.load(b); const cp = await merged.copyPages(p, p.getPageIndices());
                    cp.forEach(function(pg) { merged.addPage(pg); });
                }
                triggerDownload(new Blob([await merged.save()], {type:'application/pdf'}), (document.getElementById('customFileName').value || "合併完成") + ".pdf");
            } catch(e) { alert("合併失敗"); } finally { hideLoading(); }
        }

        // --- 分割功能 ---
        var splitDoc = null; var splitFileRef = null;
        async function handleSplitFileSelection(e) {
            var f = e.target.files[0]; if(!f) return; showLoading("讀取中...");

        async function executeImg2Pdf() {
            showLoading("正在產生 PDF...", "準備圖片資料");
            try {
                const pdfDoc = await PDFLib.PDFDocument.create();
                
                // 設定標準 A4 直式尺寸 (595.28 x 841.89 points)
                const A4_W = 595.28;
                const A4_H = 841.89;
                
                // 設定四周留白邊距 (40 points 約為 1.4 公分)
                const MARGIN = 40; 
                const MAX_W = A4_W - (MARGIN * 2);
                const MAX_H = A4_H - (MARGIN * 2);

                for (var i = 0; i < img2pdfFiles.length; i++) {
                    showLoading("正在轉換...", "處理第 " + (i+1) + " 張圖片");
                    var item = img2pdfFiles[i];
                    var f = item.file;
                    var rotation = item.rotation;
                    var embeddedImg;
                    
                    // 為了避免 Canvas 轉換造成的文字模糊與畫質減損，JPG/PNG 直接「無損嵌入」原始檔案
                    if (f.type === 'image/jpeg' || f.type === 'image/png') {
                        var imgBytes = await new Promise(function(res){ var rd=new FileReader(); rd.onload=function(ev){res(ev.target.result)}; rd.readAsArrayBuffer(f); });
                        if (f.type === 'image/jpeg') {
                            embeddedImg = await pdfDoc.embedJpg(imgBytes);
                        } else {
                            embeddedImg = await pdfDoc.embedPng(imgBytes);
                        }
                    } else {
                        // 針對 WebP 等其他非標準格式，才作為備案使用 Canvas 轉譯
                        var imgDataUrl = await new Promise(function(res){ var rd=new FileReader(); rd.onload=function(ev){res(ev.target.result)}; rd.readAsDataURL(f); });
                        var imgObj = new Image();
                        await new Promise(function(res){ imgObj.onload = res; imgObj.src = imgDataUrl; });
                        var cvs = document.createElement('canvas');
                        cvs.width = imgObj.width; cvs.height = imgObj.height;
                        cvs.getContext('2d').drawImage(imgObj, 0, 0);
                        embeddedImg = await pdfDoc.embedPng(cvs.toDataURL('image/png'));
                    }
                    
                    var page = pdfDoc.addPage([A4_W, A4_H]);
                    
                    var rawW = embeddedImg.width;
                    var rawH = embeddedImg.height;
                    
                    // 若旋轉 90 或 270 度，視覺寬高需互換來計算排版
                    var visualW = (rotation === 90 || rotation === 270) ? rawH : rawW;
                    var visualH = (rotation === 90 || rotation === 270) ? rawW : rawH;
                    
                    // 計算縮放比例，確保圖片放進 A4 時會被限制在「扣除邊距」的最大安全範圍內
                    var scale = Math.min(MAX_W / visualW, MAX_H / visualH);
                    
                    var finalVisualW = visualW * scale;
                    var finalVisualH = visualH * scale;
                    
                    // 1. 水平置中：(A4寬 - 視覺縮放後寬) / 2
                    var boxX = (A4_W - finalVisualW) / 2;
                    // 2. 靠上對齊並留邊距：PDF 的 Y 軸從底部起算
                    var boxY = A4_H - finalVisualH - MARGIN;
                    
                    // 原生大小乘上縮放
                    var sw = rawW * scale;
                    var sh = rawH * scale;
                    var drawX, drawY;

                    // 處理 pdf-lib 的旋轉錨點平移補償
                    if (rotation === 0) {
                        drawX = boxX;
                        drawY = boxY;
                    } else if (rotation === 90) {
                        drawX = boxX;
                        drawY = boxY + sw;
                    } else if (rotation === 180) {
                        drawX = boxX + sw;
                        drawY = boxY + sh;
                    } else if (rotation === 270) {
                        drawX = boxX + sh;
                        drawY = boxY;
                    }
                    
                    page.drawImage(embeddedImg, { 
                        x: drawX, 
                        y: drawY, 
                        width: sw, 
                        height: sh,
                        rotate: PDFLib.degrees(-rotation) // 負值為順時針旋轉
                    });
                }
                var outName = document.getElementById('img2pdfCustomFileName').value || "圖轉PDF完成";
                triggerDownload(new Blob([await pdfDoc.save()], {type: 'application/pdf'}), outName + ".pdf");
                showToast("轉換成功！");
            } catch(e) { alert("轉換失敗: " + e.message); } finally { hideLoading(); }
        }

        async function renderEditPage(num, scale) {

        function getMousePos(e){ var r=drawC.getBoundingClientRect(); return {x:(e.clientX-r.left)*(drawC.width/r.width), y:(e.clientY-r.top)*(drawC.height/r.height)}; }
        
        drawC.addEventListener('mousedown', function(e){
            commitText(); if(!curTool || activeIdx===-1) return;
            if(curTool==='pan'){ isPanning=true; panSX=e.clientX; panSY=e.clientY; panScX=scrl.scrollLeft; panScY=scrl.scrollTop; drawC.style.cursor='grabbing'; return; }
            if(curTool==='text'){ startText(e); return; }     
            if(curTool==='stamp'){ 
                var p=getMousePos(e); 
                var sH = EDITOR_PREVIEW_SCALE/DISPLAY_UI_SCALE;
                addAnno('stamp','✓',p.x,p.y,document.getElementById('editColor').value, 'sans-serif', 12 * sH); 
                return; 
            }
            isDrawing=true; var p=getMousePos(e); startX=p.x; startY=p.y;
            if(curTool==='eraser'){ 
                drawCtx.lineCap='round'; drawCtx.lineJoin='round'; drawCtx.lineWidth=20; drawCtx.strokeStyle='white'; 
                drawCtx.beginPath(); drawCtx.moveTo(startX, startY); drawCtx.lineTo(startX, startY); drawCtx.stroke();

            else if(curTool==='rect'){ var r=wrap.getBoundingClientRect(); rectPreview.style.display='block'; rectPreview.style.left=(e.clientX-r.left)+'px'; rectPreview.style.top=(e.clientY-r.top)+'px'; rectPreview.style.width='0'; rectPreview.style.height='0'; }
        });

        window.addEventListener('mousemove', function(e){
            if(isDrawing){ 
                var p=getMousePos(e); 
                if(curTool==='eraser'){ 
                    drawCtx.beginPath();
                    drawCtx.moveTo(startX, startY);
                    drawCtx.lineTo(p.x, p.y);
                    drawCtx.stroke();
                    startX = p.x;
                    startY = p.y;

                else if(curTool==='rect'){ 
                    var r=wrap.getBoundingClientRect(); var curX=e.clientX-r.left, curY=e.clientY-r.top;
                    var stX=startX*(DISPLAY_UI_SCALE/EDITOR_PREVIEW_SCALE), stY=startY*(DISPLAY_UI_SCALE/EDITOR_PREVIEW_SCALE);
                    rectPreview.style.left=Math.min(stX, curX)+'px'; rectPreview.style.top=Math.min(stY, curY)+'px';
                    rectPreview.style.width=Math.abs(curX-stX)+'px'; rectPreview.style.height=Math.abs(curY-stY)+'px';

            }
        }
        function syncSelectedAnnoProperties() { if (!focusedAnnoId || activeIdx===-1) return; var item = editFileList[activeIdx], anno = item.annos[item.curPage].find(function(x){return x.id === focusedAnnoId}); if (anno && anno.type !== 'image' && anno.type !== 'rect') { anno.font = document.getElementById('editFont').value; anno.color = document.getElementById('editColor').value; renderAnnos(); saveHistory(); } }
        
        function makeD(el,res,a){
            var sH=EDITOR_PREVIEW_SCALE/DISPLAY_UI_SCALE, sL=DISPLAY_UI_SCALE/EDITOR_PREVIEW_SCALE;
            el.addEventListener('mousedown', function(e){ if(e.target===res) return; e.stopPropagation(); el.focus(); var sX=e.clientX, sY=e.clientY, aX=a.x, aY=a.y;
                function mv(me){ a.x=aX+(me.clientX-sX)*sH; a.y=aY+(me.clientY-sY)*sH; el.style.left=(a.x*sL)+'px'; el.style.top=(a.y*sL)+'px'; }
                function up(){ window.removeEventListener('mousemove',mv); window.removeEventListener('mouseup',up); saveHistory(); }
                window.addEventListener('mousemove',mv); window.addEventListener('mouseup',up);
            });
            res.addEventListener('mousedown', function(e){ e.stopPropagation(); el.focus(); var sX=e.clientX, sY=e.clientY, sS=a.size;
                function mv(me){ 
                    var moveDelta = Math.max(me.clientX-sX, me.clientY-sY);
                    a.size=Math.max(12*sH, sS+moveDelta*sH); 
                    if(a.type==='image' || a.type==='rect'){el.style.width=(a.size*sL)+'px'; el.style.height=(a.size*a.aspectRatio*sL)+'px';} else el.style.fontSize=(a.size*sL)+'px'; 
                }
                function up(){ window.removeEventListener('mousemove',mv); window.removeEventListener('mouseup',up); saveHistory(); }
                window.addEventListener('mousemove',mv); window.addEventListener('mouseup',up);
            });
            el.addEventListener('wheel', function(e){ e.preventDefault(); a.size=Math.max(12*sH, a.size+(e.deltaY<0?4:-4)*sH); if(a.type==='image' || a.type==='rect'){el.style.width=(a.size*sL)+'px'; el.style.height=(a.size*a.aspectRatio*sL)+'px';} else el.style.fontSize=(a.size*sL)+'px'; clearTimeout(this.wt); this.wt=setTimeout(saveHistory,400); });
        }

        window.addEventListener('keydown', function(e){ if(e.target.tagName!=='INPUT' && e.target.tagName!=='TEXTAREA' && e.ctrlKey && e.key.toLowerCase()==='v' && clipboard && activeIdx!==-1){ var n=JSON.parse(JSON.stringify(clipboard)); n.id=Date.now()+Math.random(); n.x+=40; n.y+=40; editFileList[activeIdx].annos[editFileList[activeIdx].curPage].push(n); renderAnnos(); saveHistory(); } });

        function startText(e, presetA){ 
            var r = wrap.getBoundingClientRect();
            var activeWidget = document.createElement('div'); 
            activeWidget.className = 'absolute z-50 flex bg-white border border-blue-400 shadow-xl rounded overflow-hidden'; 
            
            var spawnX = e.clientX - r.left;
            var spawnY = e.clientY - r.top - 18;

            if (presetA) {
                var sL = DISPLAY_UI_SCALE / EDITOR_PREVIEW_SCALE;
                spawnX = presetA.x * sL - 36; 
                spawnY = presetA.y * sL - 8;  
            }

            activeWidget.style.left = spawnX + 'px'; 
            activeWidget.style.top = spawnY + 'px'; 
            
            var h=document.createElement('div'); h.innerHTML='<i class="fa-solid fa-grip-vertical text-gray-400"></i>'; h.className='px-2 py-2 bg-gray-50 cursor-move border-r flex items-center justify-center'; h.addEventListener('mousedown',function(me){isDraggingWidget=true; var wr=activeWidget.getBoundingClientRect(); dragOff.x=me.clientX-wr.left; dragOff.y=me.clientY-wr.top; me.stopPropagation();}); 
            var i = document.createElement('input'); 
            i.type = 'text'; 
            i.className = 'outline-none px-2 py-2 min-w-[150px]'; 
            i.style.fontFamily=document.getElementById('editFont').value; i.style.color=document.getElementById('editColor').value; i.style.fontSize='18px'; 
            i.style.lineHeight='1';
            i.style.fontWeight='400'; 
            
            var a=document.createElement('div'); a.className='flex bg-gray-50 border-l'; 
            a.innerHTML='<button class="flex-1 p-2 text-green-600 hover:bg-green-100 transition-colors" id="cfText"><i class="fa-solid fa-check"></i></button><button class="flex-1 p-2 text-red-600 hover:bg-red-100 transition-colors" onclick="cancelText()"><i class="fa-solid fa-xmark"></i></button>'; 
            
            activeWidget.appendChild(h); activeWidget.appendChild(i); activeWidget.appendChild(a); wrap.appendChild(activeWidget); 
            i.focus(); 
            i.addEventListener('keydown',function(ke){
                if(ke.key==='Enter') { commitText(); ke.preventDefault(); }
                if(ke.key==='Escape') cancelText();
            }); 
            activeWidget.querySelector('#cfText').onclick=commitText; window.activeWidget = activeWidget;
        }
        function openEditor(a,el){ 
            commitText(); 
            var tool=document.querySelector('input[value="text"]'); 
            if(tool && !tool.checked)tool.click(); 
            el.style.opacity='0'; 
            startText({clientX:0, clientY:0}, a); 
            var i = window.activeWidget.querySelector('input'); 
            i.value=a.content; i.style.fontSize=el.style.fontSize; 
            window.activeWidget.dataset.eid=a.id; window.activeWidget.dataset.os=a.size; i.select(); 
        }
        function cancelText(){ if(window.activeWidget){ var eid=window.activeWidget.dataset.eid; window.activeWidget.remove(); window.activeWidget=null; if(eid) renderAnnos(); } }
        function commitText(){ 
            if(!window.activeWidget || activeIdx===-1) return; 
            var i = window.activeWidget.querySelector('input'); 
            var t = i.value, eid = window.activeWidget.dataset.eid; 

            if(t.trim()!==''){ 
                var r=wrap.getBoundingClientRect(), ir=i.getBoundingClientRect(), sH=EDITOR_PREVIEW_SCALE/DISPLAY_UI_SCALE;
                var cx=(ir.left - r.left + 8)*sH; 
                var cy=(ir.top - r.top + 8)*sH; 
                
                var sz=18*sH; 
                if(window.activeWidget.dataset.os) sz=parseFloat(window.activeWidget.dataset.os); 
                if(eid) editFileList[activeIdx].annos[editFileList[activeIdx].curPage]=editFileList[activeIdx].annos[editFileList[activeIdx].curPage].filter(function(x){return x.id!=eid}); 
                addAnno('text',t,cx,cy,i.style.color,i.style.fontFamily,sz); 
            } else if(eid) { 
                editFileList[activeIdx].annos[editFileList[activeIdx].curPage]=editFileList[activeIdx].annos[editFileList[activeIdx].curPage].filter(function(x){return x.id!=eid}); 
                renderAnnos(); saveHistory(); 
            } 
            cancelText(); 
        }
        function handleImageImport(e){ if(activeIdx===-1) return; var f=e.target.files[0]; if(!f) return; var rd=new FileReader(); rd.onload=function(ev){ var i=new Image(); i.onload=function(){ var sH=EDITOR_PREVIEW_SCALE/DISPLAY_UI_SCALE, w=200*sH, ar=i.height/i.width, cx=(scrl.scrollLeft+(scrl.clientWidth/2))*sH, cy=(scrl.scrollTop+(scrl.clientHeight/2))*sH; addAnno('image',ev.target.result,cx,cy,null,null,w,ar); }; i.src=ev.target.result; }; rd.readAsDataURL(f); e.target.value=''; }

        // --- 核心優化：底層墊白防黑框存檔 ---
        async function saveEditedPDF(mode) {
            if(editFileList.length === 0) return;
            commitText();
            var listToProcess = (mode === 'all') ? editFileList : [editFileList[activeIdx]];
            showLoading("正在儲存...", "資料流封裝中");

            try {
                const masterPdf = await PDFLib.PDFDocument.create();
                
                for (var fIdx = 0; fIdx < listToProcess.length; fIdx++) {
                    var item = listToProcess[fIdx];
                    showLoading("儲存中...", "讀取 PDF: " + item.file.name);
                    
                    var b = await new Promise(function(r){ var rd=new FileReader(); rd.onload=function(ev){r(ev.target.result)}; rd.readAsArrayBuffer(item.file); });
                    const sourcePdf = await PDFLib.PDFDocument.load(b);
                    
                    var indices = [];
                    if (mode === 'page') indices = [item.curPage - 1];
                    else for (var pIdx = 0; pIdx < item.totalP; pIdx++) indices.push(pIdx);

                    const copiedPages = await masterPdf.copyPages(sourcePdf, indices);

                    for (var i = 0; i < copiedPages.length; i++) {
                        var page = masterPdf.addPage(copiedPages[i]);
                        var actualPageNum = (mode === 'page') ? item.curPage : (i + 1);
                        
                        var h = item.history[actualPageNum];
                        var annoList = item.annos[actualPageNum] || [];
                        
                        if ((h && h.length > 1) || annoList.length > 0) {
                            showLoading("封裝中...", "檔案 " + (fIdx+1) + " 第 " + actualPageNum + " 頁 (高清蓋印)");
                            var s = (h && h.length > 1) ? h[h.length - 1] : { px: null };
                            
                            var pgProxy = await item.docJS.getPage(actualPageNum);
                            var vp = pgProxy.getViewport({scale: STAMP_RENDER_SCALE}); 
                            var tc = document.createElement('canvas');
                            tc.width = Math.floor(vp.width); tc.height = Math.floor(vp.height);
                            var ctx = tc.getContext('2d');
                            
                            // 💡 關鍵修正 1：將畫布底層鋪上肉眼看不見的「透明白」，而不是預設的「透明黑」。
                            var bgData = ctx.createImageData(tc.width, tc.height);
                            for (var k = 0; k < bgData.data.length; k += 4) {
                                bgData.data[k] = 255; bgData.data[k+1] = 255; bgData.data[k+2] = 255; bgData.data[k+3] = 1;
                            }
                            ctx.putImageData(bgData, 0, 0);

                            if(s.px){ 
                                var imgPx = new Image(); 
                                await new Promise(function(res){ imgPx.onload = res; imgPx.src = s.px; }); 
                                ctx.drawImage(imgPx, 0, 0, tc.width, tc.height); 
                                
                                // 💡 關鍵修正 2：只針對「橡皮擦」的筆觸痕跡進行硬化。將半透明殘影轉為 100% 純白不透明。
                                var eData = ctx.getImageData(0, 0, tc.width, tc.height);
                                for (var k = 0; k < eData.data.length; k += 4) {
                                    if (eData.data[k+3] > 2) { 
                                        eData.data[k] = 255; eData.data[k+1] = 255; eData.data[k+2] = 255; eData.data[k+3] = 255; 
                                    }
                                }
                                ctx.putImageData(eData, 0, 0);
                            }
                            
                            for(var j = 0; j < annoList.length; j++){
                                var a = annoList[j];
                                var ratio = STAMP_RENDER_SCALE / EDITOR_PREVIEW_SCALE;
                                var rx = a.x * ratio, ry = a.y * ratio, rs = a.size * ratio;

                                if(a.type === 'image'){
                                    var imgObj = new Image(); 
                                    await new Promise(function(res){ imgObj.onload = res; imgObj.src = a.content; });
                                    var rW = Math.round(rs);
                                    var rH = Math.round(rs * a.aspectRatio);
                                    var rX = Math.round(rx - rW/2);
                                    var rY = Math.round(ry - rH/2);
                                    ctx.drawImage(imgObj, rX, rY, rW, rH);
                                } else if(a.type === 'rect'){
                                    ctx.fillStyle = 'white'; 
                                    var rW = Math.round(rs);
                                    var rH = Math.round(rs * a.aspectRatio);
                                    var rX = Math.round(rx - rW/2) - 1;
                                    var rY = Math.round(ry - rH/2) - 1;
                                    ctx.fillRect(rX, rY, rW + 2, rH + 2);
                                } else {
                                    ctx.fillStyle = a.color;
                                    if (a.type === 'stamp') {
                                        ctx.textBaseline = 'middle';
                                        ctx.textAlign = 'center'; 
                                        // 💡 修正：字體大小強制轉換為整數 (Math.round)，確保 Canvas 成功解析
                                        ctx.font = "bold " + Math.round(rs) + "px sans-serif";
                                        ctx.fillText(a.content, rx, ry);
                                    } else {
                                        ctx.textBaseline = 'top';
                                        ctx.textAlign = 'left';
                                        // 💡 關鍵修正：將 "400" 改為 "normal"，並加上 Math.round，防止 HTA 解析失敗導致字體縮水成 10px！
                                        ctx.font = "normal " + Math.round(rs) + "px " + a.font;
                                        ctx.fillText(a.content, rx, ry);
                                    }
                                }
                            }
                            
                            var png = await masterPdf.embedPng(tc.toDataURL('image/png'));
                            
                            const cb = page.getCropBox();
                            var angle = page.getRotation().angle || 0;
                            angle = ((angle % 360) + 360) % 360;

                            var vp1 = pgProxy.getViewport({scale: 1});
                            var drawW = vp1.width;  
                            var drawH = vp1.height; 
                            var drawX = cb.x, drawY = cb.y, rotAngle = 0;

                            if (angle === 90) {
                                drawX = cb.x + cb.width; 
                                drawY = cb.y;
                                rotAngle = 90;
                            } else if (angle === 180) {
                                drawX = cb.x + cb.width;
                                drawY = cb.y + cb.height;
                                rotAngle = 180;
                            } else if (angle === 270) {
                                drawX = cb.x;
                                drawY = cb.y + cb.height;
                                rotAngle = -90;
                            }

                            page.drawImage(png, { 
                                x: drawX, 
                                y: drawY, 
                                width: drawW,   
                                height: drawH, 
                                rotate: PDFLib.degrees(rotAngle) 
                            });
                            
                            tc.width = 0; tc.height = 0; tc = null;
                        }
                    }
                }

                var outName = (mode === 'page') ? "單頁擷取.pdf" : (mode === 'all' ? "PDF大合併匯出.pdf" : listToProcess[0].file.name.replace('.pdf','') + "_編輯完畢.pdf");
                triggerDownload(new Blob([await masterPdf.save()], {type: 'application/pdf'}), outName);
                showToast("成功儲存！");
            } catch(err) { alert("儲存失敗: " + err.message); } finally { hideLoading(); }
        }

        function removeEditFile(e, idx) {
            e.stopPropagation();
            if (confirm('確定移除？')) {
                editFileList.splice(idx, 1);
                if (activeIdx === idx) activeIdx = (editFileList.length > 0) ? 0 : -1;
                else if (activeIdx > idx) activeIdx--;
                renderEditFileList();
                if (activeIdx !== -1) loadEditFile(activeIdx);
            }
        }
    </script>
